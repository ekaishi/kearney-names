function getMeaning(n){return DB[n.toLowerCase().trim()]||null;}
function genId(){return Math.random().toString(36).slice(2,10);}

let state={names:[],loved:[],lovedItems:[],allSeen:[],gender:'all',currentCombo:null,history:[]};

// Meanings stored separately in localStorage - never wiped by Firebase
function saveMeaningsCache(names){
  try{
    const cache={};
    names.forEach(n=>{if(n.meanings)cache[n.name.toLowerCase()]=n.meanings;});
    localStorage.setItem('kn-meanings-cache',JSON.stringify(cache));
  }catch(e){}
}
function loadMeaningsCache(){
  try{return JSON.parse(localStorage.getItem('kn-meanings-cache')||'{}');}catch{return{};}
}
function applyMeaningsCache(names){
  const cache=loadMeaningsCache();
  return names.map(n=>({...n,meanings:n.meanings||cache[n.name.toLowerCase()]||null}));
}
let saving=false;

// ── FIREBASE SYNC ──────────────────────────────────────────
async function fbSave(){
  // Save to localStorage always
  try{ localStorage.setItem('kn-backup', JSON.stringify({
    names:state.names, loved:state.loved, lovedItems:state.lovedItems,
    allSeen:state.allSeen, history:state.history
  })); }catch(e){}
  // Save to Firebase - no timeout, just let it complete
  try{
    saving=true;
    await DOC.set({
      names:state.names,
      loved:state.loved,
      lovedItems:state.lovedItems,
      allSeen:state.allSeen,
      history:state.history
    });
    saving=false;
    document.getElementById('syncStatus').textContent='Synced';
    document.getElementById('syncStatus').style.background='rgba(180,220,180,0.4)';
  }catch(e){
    saving=false;
    console.error('Save failed',e.message);
  }
}

// Listen for real-time updates from other device
DOC.onSnapshot((snap)=>{
  if(saving) return; // Don't overwrite while saving
  document.getElementById('syncStatus').textContent='Synced';
  document.getElementById('syncStatus').style.background='rgba(180,220,180,0.4)';
  if(!snap.exists) return;
  const d=snap.data();
  const incoming=d.names||[];
  const localNames=state.names;
  // Merge: keep local meanings if Firebase doesn't have them
  state.names=applyMeaningsCache(incoming.map(n=>{
    const local=localNames.find(l=>l.id===n.id);
    return {...n, meanings: n.meanings||(local&&local.meanings)||null};
  }));
  state.loved=d.loved||[];
  state.lovedItems=d.lovedItems||[];
  state.allSeen=d.allSeen||[];
  state.history=d.history||[];
  render();
},(err)=>{
  console.error('Firestore error:',err.code, err.message);
  const badge=document.getElementById('syncStatus');
  badge.textContent=(err.code||err.message||'unknown error')+' — tap to retry';
  badge.style.cursor='pointer';
  badge.style.background='rgba(220,180,180,0.4)';
  badge.onclick=()=>{ location.reload(); };
});

async function loadInitial(){
  // Always render immediately - app is fully usable without Firebase
  render();
  document.getElementById('syncStatus').textContent='Connecting...';

  try{
    const snap = await DOC.get();
    if(snap.exists){
      const d=snap.data();
      state.names=applyMeaningsCache(d.names||[]);
      state.loved=d.loved||[];
      state.lovedItems=d.lovedItems||[];
      state.allSeen=d.allSeen||[];
      state.history=d.history||[];
      render();
    }
    document.getElementById('syncStatus').textContent='Synced';
    document.getElementById('syncStatus').style.background='rgba(180,220,180,0.4)';
  }catch(e){
    console.error('Firebase load error:',e.code||e.message);
    const badge=document.getElementById('syncStatus');
    badge.textContent='Offline (saves locally)';
    badge.style.background='rgba(220,200,180,0.4)';
    // Load from localStorage backup
    try{
      const backup=localStorage.getItem('kn-backup');
      if(backup){
        const d=JSON.parse(backup);
        state.names=applyMeaningsCache(d.names||[]);
        state.loved=d.loved||[];
        state.lovedItems=d.lovedItems||[];
        state.allSeen=d.allSeen||[];
        state.history=d.history||[];
        render();
      }
    }catch(ex){}
    render(); // still render with empty state so app is usable
  }
  render();
}

async function addName(){
  const inp=document.getElementById('nameInput');
  const t=inp.value.trim();if(!t)return;
  const name=t.charAt(0).toUpperCase()+t.slice(1);
  const meanings=getMeaning(t);
  state.names.push({id:genId(),name,
    isMale:document.getElementById('isMale').checked,
    isFemale:document.getElementById('isFemale').checked,
    isFirst:document.getElementById('isFirst').checked,
    isMiddle:document.getElementById('isMiddle').checked,
    meanings});
  state.allSeen=[];
  inp.value='';
  renderBank();
  fbSave(); // fire and forget - don't block UI
  document.getElementById('isMale').checked=false;
  document.getElementById('isFemale').checked=false;
  document.getElementById('isFirst').checked=true;
  document.getElementById('isMiddle').checked=false;
  renderBank();
};

function renderBank(){
  const el=document.getElementById('nameList');
  if(!state.names.length){el.innerHTML='<div class="empty"><p>Your name bank is empty</p><p>Add your first name above to begin</p></div>';return;}
  const girls=state.names.filter(n=>n.isFemale&&!n.isMale);
  const boys=state.names.filter(n=>n.isMale&&!n.isFemale);
  const neutral=state.names.filter(n=>(n.isMale&&n.isFemale)||(!n.isMale&&!n.isFemale));
  let h='<div class="nlist">';
  if(girls.length)h+='<div class="gsect">Girls</div>'+girls.map(nameCard).join('');
  if(boys.length)h+='<div class="gsect">Boys</div>'+boys.map(nameCard).join('');
  if(neutral.length)h+='<div class="gsect">Both / Neutral</div>'+neutral.map(nameCard).join('');
  h+='</div>';
  el.innerHTML=h;
}

function nameCard(n){
  const tags=[n.isMale?'<span class="tag tm">Boy</span>':'',n.isFemale?'<span class="tag tf">Girl</span>':'',n.isFirst?'<span class="tag t1">First</span>':'',n.isMiddle?'<span class="tag t2">Middle</span>':''].join('');
  let mInner=n.meanings
    ?`<div style="font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:#DEDAD5;font-weight:600;border-bottom:1px solid #CCBFB5;padding-bottom:3px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center"><span>Meanings</span><button onclick="editMeaning('${n.id}')" style="font-size:.6rem;border:1px solid #DEDAD5;background:transparent;border-radius:4px;padding:1px 5px;cursor:pointer;color:#7A8099;font-family:inherit">Edit</button></div>${n.meanings.map(m=>'<div class="mo">'+m.o+'</div><div class="mt">'+m.m+'</div>').join('')}`
    :`<button onclick="editMeaning('${n.id}')" class="ib" style="margin-top:2px">+ Add Meaning</button>`;
  return `<div class="ni" id="ni-${n.id}"><div style="flex:1"><div class="nin">${n.name}</div><div class="tags">${tags}</div><div class="ml" id="ml-${n.id}" style="display:none">${mInner}</div></div><div class="nibtns"><button class="ib" onclick="toggleMeaning('${n.id}')">&#10022; Meaning</button><button class="ib db" onclick="deleteName('${n.id}')">Remove</button></div></div>`;
}

function toggleMeaning(id){
  const el=document.getElementById('ml-'+id);
  if(!el)return;
  const isHidden=el.style.display==='none';
  el.style.display=isHidden?'block':'none';
  // Auto-fetch meaning if showing and no meaning yet
  if(isHidden){
    const n=state.names.find(x=>x.id===id);
    if(n&&!n.meanings&&!n.fetchingMeaning){
      fetchAIMeaning(id,n.name);
    }
  }
};

async function fetchAIMeaning(id, nameStr){
  // Try built-in database first (instant)
  const found = getMeaning(nameStr);
  if(found){
    state.names=state.names.map(n=>n.id===id?{...n,meanings:found,fetchingMeaning:false}:n);
    saveMeaningsCache(state.names);
    renderBank();
    fbSave();
    setTimeout(()=>{const el=document.getElementById('ml-'+id);if(el)el.style.display='block';},50);
    return;
  }
  // Not in DB - call Netlify serverless function for AI lookup
  const el=document.getElementById('ml-'+id);
  if(el) el.innerHTML='<div style="font-size:.74rem;color:#B0A898;font-style:italic;padding:4px 0">Looking up meaning…</div>';
  try{
    const res=await fetch(window.location.origin+'/.netlify/functions/meaning?name='+encodeURIComponent(nameStr));
    if(!res.ok) throw new Error('status '+res.status);
    const meanings=await res.json();
    if(!Array.isArray(meanings)||!meanings.length) throw new Error('empty');
    state.names=state.names.map(n=>n.id===id?{...n,meanings,fetchingMeaning:false}:n);
    fbSave();
    renderBank();
    setTimeout(()=>{const el=document.getElementById('ml-'+id);if(el)el.style.display='block';},50);
  }catch(e){
    state.names=state.names.map(n=>n.id===id?{...n,fetchingMeaning:false}:n);
    const el=document.getElementById('ml-'+id);
    if(el) el.innerHTML='<div style="font-size:.72rem;color:#B0A898;font-style:italic;margin-bottom:6px">Error: '+e.message+'</div><button onclick="fetchAIMeaning(\''+id+'\',\''+nameStr+'\')" class="ib" style="margin-right:6px">Retry</button><button onclick="editMeaning(\''+id+'\')" class="ib">+ Add Manually</button>';
  }
}

async function saveMeaning(id){
  const el=document.getElementById('drafts-'+id);
  const count=el.querySelectorAll('textarea').length;
  const meanings=[];
  for(let i=0;i<count;i++){
    const o=document.getElementById('dO-'+id+'-'+i);

  fbSave();
  setTimeout(()=>{const el=document.getElementById('ml-'+id);if(el)el.style.display='block';},50);
};

function checkCanShuffle(){
  const btn=document.getElementById('shuffleBtn');

  else if(useMiddle&&!mns.length){ok=false;msg='Add at least one Middle Name or uncheck Include.';}
  btn.disabled=!ok;
  warn.style.display=ok?'none':'block';
  warn.textContent=msg;
}

function gfStrict(fn,mn){
  if(state.gender!=='all')return true;
  const fnM=fn.isMale&&!fn.isFemale,fnF=fn.isFemale&&!fn.isMale;
  const mnM=mn.isMale&&!mn.isFemale,mnF=mn.isFemale&&!mn.isMale;
  if(!fnM&&!fnF)return true;if(!mnM&&!mnF)return true;
  return(fnM&&mnM)||(fnF&&mnF);
}

async function doShuffle(){
  const lockFirst=document.getElementById('lockFirst').checked;
  const useMiddle=document.getElementById('useMiddle').checked;
  const lockMiddle=document.getElementById('lockMiddle')&&document.getElementById('lockMiddle').checked;
  const lockedFirstEl=document.getElementById('lockedFirst');
  const lockedMiddleEl=document.getElementById('lockedMiddle');
  const fns=state.names.filter(n=>n.isFirst&&gf(n));
  const mns=state.names.filter(n=>n.isMiddle&&gf(n));
  const fnPool=lockFirst&&lockedFirstEl&&lockedFirstEl.value?[state.names.find(n=>n.id===lockedFirstEl.value)]:fns;
  const mnPool=useMiddle?(lockMiddle&&lockedMiddleEl&&lockedMiddleEl.value?[state.names.find(n=>n.id===lockedMiddleEl.value)]:mns):[null];
  if(!fnPool[0])return;
  const allCombos=[];
  for(const fn of fnPool)for(const mn of mnPool){
    if(mn&&fn.name.toLowerCase()===mn.name.toLowerCase())continue;
    if(!mn||gfStrict(fn,mn))allCombos.push({fn,mn,key:fn.name+'+'+(mn?mn.name:'none')});
  }
  if(!allCombos.length)return;
  const seen=new Set(state.allSeen);
  const unused=allCombos.filter(c=>!seen.has(c.key));
  if(!unused.length){alert("You've seen every combination! Tap Reset Seen to start over.");return;}
  const pick=unused[Math.floor(Math.random()*unused.length)];
  const{fn,mn}=pick;
  seen.add(pick.key);
  state.allSeen=[...seen];
  const display=mn?fn.name+' '+mn.name+' '+LN:fn.name+' '+LN;
  const gender=fn.isMale&&!fn.isFemale?'Boy':fn.isFemale&&!fn.isMale?'Girl':'Neutral';
  const c={id:genId(),fn,mn,display,gender};
  state.currentCombo=c;
  state.history=[c,...state.history.slice(0,99)];
  await fbSave();
  renderCombo();renderRecent();
};

async function resetSeen(){
  state.allSeen=[];state.currentCombo=null;

    if(c.mn&&c.mn.meanings)mh+='<div><div class="smhdr">'+c.mn.name+'</div>'+c.mn.meanings.map(m=>'<div class="mo">'+m.o+'</div><div class="mt">'+m.m+'</div>').join('')+'</div>';

function toggleLoveCurrent(){const c=state.currentCombo;if(c)toggleLove(c.id,c);};

async function toggleLove(id,comboObj){
  if(typeof comboObj==='string')comboObj=JSON.parse(comboObj);
  const isLoved=state.loved.includes(id);
  if(isLoved){state.loved=state.loved.filter(x=>x!==id);state.lovedItems=state.lovedItems.filter(x=>x.id!==id);}
  else{state.loved.push(id);state.lovedItems=state.lovedItems.filter(x=>x.id!==id);state.lovedItems.push(comboObj);}
  await fbSave();
  if(state.currentCombo&&state.currentCombo.id===id)renderCombo();
  renderRecent();
};

function renderRecent(){
  const el=document.getElementById('recentCombos');
  const hist=state.history.slice(1);
  if(!hist.length){el.innerHTML='';return;}
  let h='<div class="dv"></div><div class="st">Recent Combos</div><div class="hl">';
  hist.forEach(c=>{
    const isLoved=state.loved.includes(c.id);
    const cStr=JSON.stringify(c).replace(/'/g,"\\'");
    h+=`<div class="hi" style="cursor:default"><span class="hn">${c.display}</span><button class="hb${isLoved?' lv':''}" style="margin-top:0" onclick='toggleLove("${c.id}","${encodeURIComponent(JSON.stringify(c))}")'>${isLoved?'♥':'♡'}</button></div>`;
  });
  h+='</div>';
  el.innerHTML=h;
}

async function toggleLove(id,comboObjOrStr){
  let comboObj=comboObjOrStr;
  if(typeof comboObjOrStr==='string'){try{comboObj=JSON.parse(decodeURIComponent(comboObjOrStr));}catch{comboObj=null;}}
  const isLoved=state.loved.includes(id);
  if(isLoved){state.loved=state.loved.filter(x=>x!==id);state.lovedItems=state.lovedItems.filter(x=>x.id!==id);}
  else if(comboObj){state.loved.push(id);state.lovedItems=state.lovedItems.filter(x=>x.id!==id);state.lovedItems.push(comboObj);}
  await fbSave();
  if(state.currentCombo&&state.currentCombo.id===id)renderCombo();
  renderRecent();
};

function renderLoved(){
  const el=document.getElementById('lovedList');
  if(!state.lovedItems.length){el.innerHTML='<div class="empty"><p>No favourites yet</p><p>Heart a name combo in the Shuffler</p></div>';return;}
  let h='<div class="hl" id="lovedDrag">';
  state.lovedItems.forEach((c,i)=>{
    h+=`<div class="hi" draggable="true" data-idx="${i}" data-id="${c.id}">`;
    h+=`<div style="display:flex;align-items:center;gap:8px"><span style="font-size:16px;color:#DEDAD5;cursor:grab">&#8942;&#8942;</span><span class="hrank">#${i+1}</span>`;
    h+=`<div><div class="hn">${c.display}</div><div style="font-size:.68rem;color:#7A8099;margin-top:2px;text-transform:uppercase;letter-spacing:.07em">${c.gender}</div></div></div>`;
    h+=`<button class="hb lv" style="margin-top:0" onclick='toggleLove("${c.id}","${encodeURIComponent(JSON.stringify(c))}")'>&#9829; Remove</button></div>`;
  });
  h+='</div>';
  el.innerHTML=h;
  setupDrag();
}

function setupDrag(){
  const el=document.getElementById('lovedDrag');if(!el)return;
  let dragSrc=null;
  el.querySelectorAll('.hi').forEach(row=>{
    row.addEventListener('dragstart',()=>{dragSrc=parseInt(row.dataset.idx);row.style.opacity='.4';});
    row.addEventListener('dragend',()=>{row.style.opacity='1';});
    row.addEventListener('dragover',e=>{e.preventDefault();row.classList.add('drag-over');});
    row.addEventListener('dragleave',()=>row.classList.remove('drag-over'));
    row.addEventListener('drop',async e=>{
      e.preventDefault();row.classList.remove('drag-over');
      const tgt=parseInt(row.dataset.idx);
      if(dragSrc===null||dragSrc===tgt)return;
      const arr=[...state.lovedItems];
      const[item]=arr.splice(dragSrc,1);arr.splice(tgt,0,item);
      state.lovedItems=arr;await fbSave();renderLoved();
    });
  });
}

function render(){renderBank();renderShuffleControls();renderLoved();}
loadInitial();
</script>
